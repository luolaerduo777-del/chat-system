<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - 校园聊天室</title>
    <style>
        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 18px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 28px;
            color: #111827;
        }

        p {
            margin: 0 0 24px;
            color: #6b7280;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            border: none;
            background: #2563eb;
            color: white;
            padding: 14px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .msg {
            min-height: 22px;
            margin-top: 14px;
            color: #dc2626;
            font-size: 14px;
        }

        .success {
            color: #16a34a;
        }

        .link {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
        }

        .link a {
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>注册</h1>
        <p>创建你的聊天室账号</p>

        <input id="username" placeholder="用户名（至少2位）" />
        <input id="password" type="password" placeholder="密码（至少4位）" />
        <button onclick="registerUser()">注册</button>

        <div class="msg" id="msg"></div>

        <div class="link">
            已有账号？<a href="/login">去登录</a>
        </div>
    </div>

    <script>
        async function registerUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const msg = document.getElementById("msg");

            msg.className = "msg";
            msg.innerText = "";

            const res = await fetch("/api/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.ok) {
                msg.className = "msg success";
                msg.innerText = "注册成功，正在跳转到登录页...";
                setTimeout(() => {
                    window.location.href = "/login";
                }, 1200);
            } else {
                msg.innerText = data.message || "注册失败";
            }
        }

        document.getElementById("password").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                registerUser();
            }
        });
    </script>
</body>
</html>
