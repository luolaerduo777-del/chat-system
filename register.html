<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>注册 - 校园聊天室</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background:
                radial-gradient(circle at top right, #34d399, transparent 32%),
                linear-gradient(135deg, #020617, #0f172a 55%, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e5e7eb;
            overflow: hidden;
        }

        .card {
            width: 420px;
            max-width: calc(100% - 32px);
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.25);
            backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: 34px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            animation: fadeUp 0.45s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(18px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .logo {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 22px;
            margin-bottom: 18px;
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.3);
        }

        h1 {
            margin: 0;
            font-size: 30px;
        }

        p {
            margin: 8px 0 26px;
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 15px 16px;
            margin-bottom: 14px;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 14px;
            background: rgba(15, 23, 42, 0.72);
            color: #e5e7eb;
            outline: none;
            font-size: 14px;
            transition: 0.22s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus {
            border-color: #34d399;
            box-shadow: 0 0 0 4px rgba(52, 211, 153, 0.14);
        }

        button {
            width: 100%;
            border: none;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            color: white;
            padding: 15px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s ease;
            margin-top: 4px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 32px rgba(16, 185, 129, 0.34);
        }

        button:active {
            transform: scale(0.97);
        }

        .msg {
            min-height: 22px;
            margin-top: 14px;
            color: #f87171;
            font-size: 14px;
        }

        .msg.success {
            color: #34d399;
        }

        .link {
            margin-top: 20px;
            text-align: center;
            font-size: 14px;
            color: #94a3b8;
        }

        .link a {
            color: #60a5fa;
            font-weight: 800;
            text-decoration: none;
        }

        .link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">AI</div>
        <h1>创建账号</h1>
        <p>注册后即可进入 AI 校园聊天室。</p>

        <input id="username" placeholder="用户名（至少2位）" />
        <input id="password" type="password" placeholder="密码（至少4位）" />
        <button onclick="registerUser()">注册</button>

        <div class="msg" id="msg"></div>

        <div class="link">
            已有账号？<a href="/login">返回登录</a>
        </div>
    </div>

    <script>
        async function registerUser() {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const msg = document.getElementById("msg");

            msg.className = "msg";
            msg.innerText = "";

            const res = await fetch("/api/register", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (data.ok) {
                msg.className = "msg success";
                msg.innerText = "注册成功，正在跳转到登录页...";
                setTimeout(() => {
                    window.location.href = "/login";
                }, 900);
            } else {
                msg.innerText = data.message || "注册失败";
            }
        }

        document.getElementById("password").addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                registerUser();
            }
        });
    </script>
</body>
</html>
