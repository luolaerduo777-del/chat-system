<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园聊天室</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: #f3f6fb;
            color: #1f2937;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 28px auto;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
            padding: 24px 28px;
        }

        .header h1 {
            margin: 0;
            font-size: 28px;
        }

        .header p {
            margin: 8px 0 0;
            opacity: 0.92;
            font-size: 14px;
        }

        .join-area {
            padding: 18px 28px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #f9fafb;
        }

        .join-area input {
            flex: 1;
            min-width: 180px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .join-area input:focus,
        .message-input input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .join-area button,
        .message-input button {
            border: none;
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .join-area button:hover,
        .message-input button:hover {
            background: #1d4ed8;
        }

        .status-bar {
            padding: 14px 28px;
            background: #eff6ff;
            border-bottom: 1px solid #dbeafe;
            font-size: 14px;
            color: #1d4ed8;
        }

        .main-content {
            display: flex;
            min-height: 580px;
        }

        .room-sidebar {
            width: 220px;
            border-right: 1px solid #e5e7eb;
            background: #f9fafb;
            display: flex;
            flex-direction: column;
        }

        .sidebar-title {
            padding: 18px 18px 12px;
            font-weight: 700;
            color: #1f2937;
            border-bottom: 1px solid #e5e7eb;
        }

        .room-list {
            list-style: none;
            margin: 0;
            padding: 12px;
        }

        .room-item {
            padding: 12px 14px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e5e7eb;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .room-item:hover {
            background: #eef2ff;
            border-color: #bfdbfe;
        }

        .room-item.active {
            background: #2563eb;
            color: white;
            border-color: #2563eb;
        }

        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #e5e7eb;
        }

        .chat-area {
            padding: 20px 28px;
            height: 460px;
            overflow-y: auto;
            background: #ffffff;
            flex: 1;
        }

        .message-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .message-row {
            display: flex;
            margin-bottom: 14px;
        }

        .message-row.self {
            justify-content: flex-end;
        }

        .message-row.other,
        .message-row.system {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 14px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .message-row.self .message-bubble {
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-row.other .message-bubble {
            background: #f3f4f6;
            color: #111827;
            border-bottom-left-radius: 4px;
        }

        .message-row.system .message-bubble {
            background: #eef2ff;
            color: #4338ca;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .message-sender {
            font-size: 12px;
            font-weight: 700;
            opacity: 0.9;
        }

        .message-time {
            font-size: 12px;
            opacity: 0.75;
        }

        .message-text {
            font-size: 14px;
        }

        .message-input {
            display: flex;
            gap: 12px;
            padding: 18px 28px 24px;
            border-top: 1px solid #e5e7eb;
            background: #f9fafb;
        }

        .message-input input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            outline: none;
            font-size: 14px;
        }

        .sidebar {
            width: 280px;
            background: #fbfcff;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 18px 20px;
            border-bottom: 1px solid #e5e7eb;
            font-weight: 700;
            color: #1f2937;
        }

        .online-count {
            font-size: 13px;
            color: #6b7280;
            margin-top: 4px;
            font-weight: 400;
        }

        .user-list {
            list-style: none;
            margin: 0;
            padding: 14px;
            overflow-y: auto;
        }

        .user-item {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .user-item.self {
            border-color: #93c5fd;
            background: #eff6ff;
        }

        .tip {
            padding: 0 28px 20px;
            font-size: 13px;
            color: #6b7280;
            background: #f9fafb;
        }

        @media (max-width: 980px) {
            .main-content {
                flex-direction: column;
            }

            .room-sidebar,
            .sidebar {
                width: 100%;
            }

            .chat-panel {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            .room-sidebar {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
            }

            .room-list {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .room-item {
                margin-bottom: 0;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .join-area,
            .message-input {
                flex-direction: column;
                align-items: stretch;
            }

            .join-area button,
            .message-input button {
                width: 100%;
            }

            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>校园聊天室</h1>
            <p>轻量级即时聊天模块 · 支持房间列表切换、聊天记录、时间戳、在线用户</p>
        </div>

        <div class="join-area">
            <input id="username" placeholder="请输入用户名" />
            <input id="room" placeholder="也可以手动输入房间名" />
            <button onclick="joinRoom()">进入房间</button>
        </div>

        <div class="status-bar" id="statusBar">
            当前状态：未进入房间
        </div>

        <div class="main-content">
            <div class="room-sidebar">
                <div class="sidebar-title">房间列表</div>
                <ul class="room-list" id="roomList">
                    <li class="room-item" onclick="selectRoom('math')">math</li>
                    <li class="room-item" onclick="selectRoom('ai')">ai</li>
                    <li class="room-item" onclick="selectRoom('class-1')">class-1</li>
                    <li class="room-item" onclick="selectRoom('dorm')">dorm</li>
                    <li class="room-item" onclick="selectRoom('trade')">trade</li>
                </ul>
            </div>

            <div class="chat-panel">
                <div class="chat-area" id="chatArea">
                    <ul id="messages" class="message-list"></ul>
                </div>

                <div class="message-input">
                    <input id="message" placeholder="请输入消息后发送" />
                    <button onclick="sendMessage()">发送</button>
                </div>

                <div class="tip">
                    提示：先输入用户名，然后点击左侧房间，或者手动输入房间名后进入。
                </div>
            </div>

            <div class="sidebar">
                <div class="sidebar-header">
                    在线用户
                    <div class="online-count" id="onlineCount">当前 0 人</div>
                </div>
                <ul class="user-list" id="userList"></ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        let currentRoom = "";
        let currentUsername = "";
        let hasJoined = false;

        function updateStatus(text) {
            document.getElementById("statusBar").innerText = text;
        }

        function appendMessage(message) {
            const messages = document.getElementById("messages");
            const row = document.createElement("li");

            let rowClass = "other";
            if (message.type === "system") {
                rowClass = "system";
            } else if (message.sender === currentUsername) {
                rowClass = "self";
            }

            row.className = "message-row " + rowClass;

            const bubble = document.createElement("div");
            bubble.className = "message-bubble";

            const meta = document.createElement("div");
            meta.className = "message-meta";

            const sender = document.createElement("div");
            sender.className = "message-sender";
            sender.innerText = message.sender || "未知用户";

            const time = document.createElement("div");
            time.className = "message-time";
            time.innerText = message.time || "";

            const text = document.createElement("div");
            text.className = "message-text";
            text.innerText = message.text || "";

            meta.appendChild(sender);
            meta.appendChild(time);
            bubble.appendChild(meta);
            bubble.appendChild(text);
            row.appendChild(bubble);
            messages.appendChild(row);

            const chatArea = document.getElementById("chatArea");
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderUserList(users) {
            const userList = document.getElementById("userList");
            const onlineCount = document.getElementById("onlineCount");

            userList.innerHTML = "";
            onlineCount.innerText = `当前 ${users.length} 人`;

            users.forEach(function(user) {
                const li = document.createElement("li");
                li.className = "user-item";

                if (user === currentUsername) {
                    li.classList.add("self");
                    li.innerText = `${user}（你）`;
                } else {
                    li.innerText = user;
                }

                userList.appendChild(li);
            });
        }

        function highlightRoom(roomName) {
            const items = document.querySelectorAll(".room-item");
            items.forEach(item => {
                item.classList.remove("active");
                if (item.innerText === roomName) {
                    item.classList.add("active");
                }
            });
        }

        function joinRoom() {
            const usernameInput = document.getElementById("username");
            const roomInput = document.getElementById("room");

            currentUsername = usernameInput.value.trim();
            currentRoom = roomInput.value.trim();

            if (!currentUsername || !currentRoom) {
                alert("请输入用户名和房间名");
                return;
            }

            document.getElementById("messages").innerHTML = "";
            document.getElementById("userList").innerHTML = "";
            document.getElementById("onlineCount").innerText = "当前 0 人";

            socket.emit("join", {
                username: currentUsername,
                room: currentRoom
            });

            hasJoined = true;
            highlightRoom(currentRoom);
            updateStatus(`当前状态：已进入房间【${currentRoom}】；当前用户：${currentUsername}`);
        }

        function selectRoom(roomName) {
            const username = document.getElementById("username").value.trim();

            if (!username) {
                alert("请先输入用户名");
                return;
            }

            document.getElementById("room").value = roomName;
            joinRoom();
        }

        socket.on("history", function(messages) {
            const messagesList = document.getElementById("messages");
            messagesList.innerHTML = "";

            messages.forEach(function(message) {
                appendMessage(message);
            });
        });

        socket.on("message", function(message) {
            appendMessage(message);
        });

        socket.on("user_list", function(users) {
            renderUserList(users);
        });

        socket.on("error_message", function(msg) {
            alert(msg);
        });

        function sendMessage() {
            if (!hasJoined) {
                alert("请先进入房间");
                return;
            }

            const messageInput = document.getElementById("message");
            const msg = messageInput.value.trim();

            if (!msg) {
                return;
            }

            socket.emit("message", {
                username: currentUsername,
                room: currentRoom,
                msg: msg
            });

            messageInput.value = "";
        }

        document.getElementById("message").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
