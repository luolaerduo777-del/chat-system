<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>校园聊天室</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --card-soft: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --border: #e2e8f0;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --bubble-self: #2563eb;
            --bubble-other: #f1f5f9;
            --bubble-ai: #ecfdf5;
            --ai-border: #86efac;
            --shadow: rgba(15, 23, 42, 0.08);
        }

        body.dark {
            --bg: #0f172a;
            --card: #111827;
            --card-soft: #1e293b;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --border: #334155;
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bubble-self: #2563eb;
            --bubble-other: #1e293b;
            --bubble-ai: #064e3b;
            --ai-border: #10b981;
            --shadow: rgba(0, 0, 0, 0.35);
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
    height: 72px;
    background: linear-gradient(135deg, var(--primary), #60a5fa);
    color: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    box-shadow: 0 8px 24px var(--shadow);
    transition: background 0.35s ease, box-shadow 0.35s ease;
}

/* 👇 新增：深色模式 */
body.dark .topbar {
    background: linear-gradient(135deg, #020617, #1e293b);
}

        .brand {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand h1 {
            margin: 0;
            font-size: 24px;
        }

        .brand span {
            font-size: 13px;
            opacity: 0.9;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-btn {
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.18);
            color: white;
            cursor: pointer;
            font-weight: 700;
        }

        .top-btn:hover {
            background: rgba(255, 255, 255, 0.28);
        }

        .layout {
            flex: 1;
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            gap: 0;
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            padding: 22px;
        }

        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            box-shadow: 0 8px 28px var(--shadow);
        }

        .left-panel {
            border-radius: 18px 0 0 18px;
            overflow: hidden;
        }

        .right-panel {
            border-radius: 0 18px 18px 0;
            overflow: hidden;
        }

        .chat-panel {
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--card);
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 116px);
        }

        .panel-title {
            padding: 18px 18px;
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            font-size: 16px;
        }

        .user-card {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            background: var(--card-soft);
        }

        .user-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 900;
            flex-shrink: 0;
        }

        .avatar.ai {
            background: linear-gradient(135deg, #10b981, #22c55e);
        }

        .avatar.system {
            background: linear-gradient(135deg, #6366f1, #818cf8);
        }

        .user-meta {
            min-width: 0;
        }

        .user-meta .name {
            font-weight: 800;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .user-meta .desc {
            font-size: 12px;
            color: var(--muted);
            margin-top: 3px;
        }

        .join-box {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        .join-box input {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            padding: 12px 13px;
            border-radius: 12px;
            outline: none;
            font-size: 14px;
        }

        .join-box button {
            width: 100%;
            margin-top: 10px;
            border: none;
            background: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 800;
        }

        .join-box button:hover {
            background: var(--primary-dark);
        }

        .room-section {
            padding: 16px 18px;
        }

        .section-label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 800;
            margin-bottom: 12px;
        }

        .room-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .room-item {
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card-soft);
            margin-bottom: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.18s;
        }

        .room-item:hover {
            transform: translateY(-1px);
            border-color: var(--primary);
        }

        .room-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .empty-tip {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.7;
        }

        .status {
            padding: 14px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--card-soft);
            color: var(--muted);
            font-size: 14px;
        }

        .status b {
            color: var(--primary);
        }

        .chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .message-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .message-row {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            align-items: flex-end;
        }

        .message-row.self {
            justify-content: flex-end;
        }

        .message-row.self .msg-avatar {
            order: 2;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #64748b, #94a3b8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 13px;
            font-weight: 900;
        }

        .message-row.self .msg-avatar {
            background: linear-gradient(135deg, #2563eb, #60a5fa);
        }

        .message-row.ai .msg-avatar {
            background: linear-gradient(135deg, #10b981, #22c55e);
        }

        .message-row.system .msg-avatar {
            background: linear-gradient(135deg, #6366f1, #818cf8);
        }

        .message-bubble {
            max-width: 72%;
            padding: 12px 14px;
            border-radius: 18px;
            line-height: 1.65;
            word-break: break-word;
            box-shadow: 0 6px 18px var(--shadow);
            background: var(--bubble-other);
            color: var(--text);
        }

        .message-row.self .message-bubble {
            background: var(--bubble-self);
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message-row.other .message-bubble {
            border-bottom-left-radius: 6px;
        }

        .message-row.system .message-bubble {
            background: #eef2ff;
            color: #4338ca;
            border-bottom-left-radius: 6px;
        }

        body.dark .message-row.system .message-bubble {
            background: #1e1b4b;
            color: #c4b5fd;
        }

        .message-row.ai .message-bubble {
            background: var(--bubble-ai);
            color: #065f46;
            border: 1px solid var(--ai-border);
            border-bottom-left-radius: 6px;
        }

        body.dark .message-row.ai .message-bubble {
            color: #d1fae5;
        }

        .message-meta {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 5px;
            font-size: 12px;
            opacity: 0.9;
        }

        .message-sender {
            font-weight: 900;
        }

        .message-time {
            opacity: 0.75;
        }

        .message-text {
            font-size: 14px;
            white-space: pre-wrap;
        }

        .input-area {
            padding: 16px 22px;
            border-top: 1px solid var(--border);
            background: var(--card-soft);
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .ai-toggle-switch {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    font-weight: 900;
    color: var(--muted);
}

.ai-toggle-switch input {
    display: none;
}

.switch-slider {
    width: 50px;
    height: 28px;
    border-radius: 999px;
    background: #cbd5e1;
    position: relative;
    transition: background 0.25s ease, box-shadow 0.25s ease;
}

.switch-slider::before {
    content: "";
    position: absolute;
    width: 22px;
    height: 22px;
    left: 3px;
    top: 3px;
    border-radius: 50%;
    background: white;
    box-shadow: 0 3px 10px rgba(0, 0, 0, 0.25);
    transition: transform 0.25s ease;
}

.ai-toggle-switch input:checked + .switch-slider {
    background: linear-gradient(135deg, #10b981, #22c55e);
    box-shadow: 0 0 18px rgba(16, 185, 129, 0.35);
}

.ai-toggle-switch input:checked + .switch-slider::before {
    transform: translateX(22px);
}

.switch-text {
    font-size: 14px;
}

        .input-row input[type="text"] {
            flex: 1;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            padding: 14px 15px;
            border-radius: 16px;
            outline: none;
            font-size: 14px;
        }

        .send-btn {
            border: none;
            background: var(--primary);
            color: white;
            padding: 14px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 900;
        }

        .send-btn:hover {
            background: var(--primary-dark);
        }

        .tip {
            margin-top: 10px;
            font-size: 12px;
            color: var(--muted);
        }

        .online-count {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            margin-top: 4px;
        }

        .user-list {
            list-style: none;
            margin: 0;
            padding: 14px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--card-soft);
            border: 1px solid var(--border);
            border-radius: 14px;
            margin-bottom: 10px;
        }

        .user-item.self {
            border-color: var(--primary);
        }

        .small-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 900;
        }

        @media (max-width: 1050px) {
            .layout {
                grid-template-columns: 1fr;
                padding: 12px;
            }

            .left-panel,
            .right-panel,
            .chat-panel {
                border-radius: 18px;
                margin-bottom: 12px;
            }

            .chat-panel {
                min-height: 640px;
            }

            .message-bubble {
                max-width: 86%;
            }

            .topbar {
                padding: 0 16px;
            }
        }
* {
    transition:
        background-color 0.25s ease,
        color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
}

.panel,
.chat-panel,
.message-bubble,
.room-item,
.user-item {
    animation: fadeUp 0.25s ease;
}

.message-row {
    animation: messageIn 0.22s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(8px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes messageIn {
    from {
        opacity: 0;
        transform: translateY(8px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* hover 动画 */
.room-item,
.send-btn,
.top-btn,
.join-box button {
    transition:
        transform 0.18s ease,
        background-color 0.25s ease,
        border-color 0.25s ease;
}

.room-item:hover,
.send-btn:hover,
.top-btn:hover,
.join-box button:hover {
    transform: translateY(-2px);
}

.send-btn:active,
.top-btn:active,
.join-box button:active {
    transform: scale(0.96);
}
body.theme-changing .topbar,
body.theme-changing .panel,
body.theme-changing .chat-panel {
    transition: all 0.3s ease;
}
    </style>
</head>
<body>
    <div class="app">
        <div class="topbar">
            <div class="brand">
                <h1>校园聊天室</h1>
                <span>实时聊天 · AI助手 · 多房间 · 深色模式</span>
            </div>
            <div class="top-actions">
                <button class="top-btn" onclick="toggleTheme()">深色模式</button>
                <button class="top-btn" onclick="logout()">退出登录</button>
            </div>
        </div>

        <div class="layout">
            <aside class="panel left-panel">
                <div class="panel-title">房间</div>

                <div class="user-card">
                    <div class="user-row">
                        <div class="avatar" id="myAvatar">U</div>
                        <div class="user-meta">
                            <div class="name" id="usernameText">未登录</div>
                            <div class="desc">当前账号</div>
                        </div>
                    </div>
                </div>

                <div class="join-box">
                    <input id="room" placeholder="输入房间名，例如 cs / ai / dorm" />
                    <button onclick="joinRoom()">进入房间</button>
                </div>

                <div class="room-section">
                    <div class="section-label">最近使用</div>
                    <ul class="room-list" id="recentRoomList"></ul>
                    <div class="empty-tip" id="recentEmptyTip">
                        还没有最近使用的房间。<br />
                        先输入一个房间名进入吧。
                    </div>
                </div>
            </aside>

            <main class="chat-panel">
                <div class="status" id="statusBar">
                    当前状态：未进入房间
                </div>

                <div class="chat-area" id="chatArea">
                    <ul id="messages" class="message-list"></ul>
                </div>

                <div class="input-area">
                    <div class="input-row">
                        <label class="ai-toggle-switch">
    <input type="checkbox" id="aiToggle">
    <span class="switch-slider"></span>
    <span class="switch-text">AI</span>
</label>
                        <input id="message" type="text" placeholder="输入消息；开启AI后可用 @ai 提问" />
                        <button class="send-btn" onclick="sendMessage()">发送</button>
                    </div>
                    <div class="tip">
                        AI关闭时不会回复；AI开启后，只有输入 <b>@ai 问题</b> 才会触发AI。
                    </div>
                </div>
            </main>

            <aside class="panel right-panel">
                <div class="panel-title">
                    在线用户
                    <div class="online-count" id="onlineCount">当前 0 人</div>
                </div>
                <ul class="user-list" id="userList"></ul>
            </aside>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        let currentRoom = "";
        let currentUsername = "";
        let hasJoined = false;

        const recentRoomsKey = "recent_rooms_v3";
        const themeKey = "chat_theme_v3";

        function getInitial(name) {
            return (name || "?").trim().charAt(0).toUpperCase();
        }

        function getRecentRooms() {
            const data = localStorage.getItem(recentRoomsKey);
            return data ? JSON.parse(data) : [];
        }

        function saveRecentRooms(rooms) {
            localStorage.setItem(recentRoomsKey, JSON.stringify(rooms));
        }

        function addRecentRoom(roomName) {
            let rooms = getRecentRooms().filter(room => room !== roomName);
            rooms.unshift(roomName);
            rooms = rooms.slice(0, 8);
            saveRecentRooms(rooms);
            renderRecentRooms();
        }

        function updateStatus() {
            const statusBar = document.getElementById("statusBar");

            if (!hasJoined) {
                statusBar.innerHTML = "当前状态：未进入房间";
                return;
            }

            statusBar.innerHTML = `当前状态：已进入房间 <b>【${currentRoom}】</b>；当前用户：<b>${currentUsername}</b>`;
        }

        function typeWriter(element, text, speed = 22) {
            let i = 0;
            element.innerText = "";

            function typing() {
                if (i < text.length) {
                    element.innerText += text.charAt(i);
                    i++;
                    const chatArea = document.getElementById("chatArea");
                    chatArea.scrollTop = chatArea.scrollHeight;
                    setTimeout(typing, speed);
                }
            }

            typing();
        }

        function appendMessage(message, animateAI = false) {
            const messages = document.getElementById("messages");
            const row = document.createElement("li");

            let rowClass = "other";

            if (message.type === "system") {
                rowClass = "system";
            } else if (message.type === "ai") {
                rowClass = "ai";
            } else if (message.sender === currentUsername) {
                rowClass = "self";
            }

            row.className = "message-row " + rowClass;

            const avatar = document.createElement("div");
            avatar.className = "msg-avatar";

            if (message.type === "ai") {
                avatar.innerText = "AI";
            } else if (message.type === "system") {
                avatar.innerText = "S";
            } else {
                avatar.innerText = getInitial(message.sender);
            }

            const bubble = document.createElement("div");
            bubble.className = "message-bubble";

            const meta = document.createElement("div");
            meta.className = "message-meta";

            const sender = document.createElement("div");
            sender.className = "message-sender";
            sender.innerText = message.sender || "未知用户";

            const time = document.createElement("div");
            time.className = "message-time";
            time.innerText = message.time || "";

            const text = document.createElement("div");
            text.className = "message-text";

            meta.appendChild(sender);
            meta.appendChild(time);
            bubble.appendChild(meta);
            bubble.appendChild(text);

            row.appendChild(avatar);
            row.appendChild(bubble);
            messages.appendChild(row);

            if (message.type === "ai" && animateAI) {
                typeWriter(text, message.text || "", 22);
            } else {
                text.innerText = message.text || "";
            }

            const chatArea = document.getElementById("chatArea");
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function renderUserList(users) {
            const userList = document.getElementById("userList");
            const onlineCount = document.getElementById("onlineCount");

            userList.innerHTML = "";
            onlineCount.innerText = `当前 ${users.length} 人`;

            users.forEach(function(user) {
                const li = document.createElement("li");
                li.className = "user-item";

                if (user === currentUsername) {
                    li.classList.add("self");
                }

                const avatar = document.createElement("div");
                avatar.className = "small-avatar";
                avatar.innerText = getInitial(user);

                const name = document.createElement("div");
                name.innerText = user === currentUsername ? `${user}（你）` : user;

                li.appendChild(avatar);
                li.appendChild(name);
                userList.appendChild(li);
            });
        }

        function highlightRoom(roomName) {
            const items = document.querySelectorAll(".room-item");
            items.forEach(item => {
                item.classList.remove("active");
                if (item.dataset.room === roomName) {
                    item.classList.add("active");
                }
            });
        }

        function renderRecentRooms() {
            const recentRoomList = document.getElementById("recentRoomList");
            const emptyTip = document.getElementById("recentEmptyTip");
            const recentRooms = getRecentRooms();

            recentRoomList.innerHTML = "";

            if (recentRooms.length === 0) {
                emptyTip.style.display = "block";
                return;
            }

            emptyTip.style.display = "none";

            recentRooms.forEach(function(roomName) {
                const li = document.createElement("li");
                li.className = "room-item";
                li.dataset.room = roomName;
                li.innerText = roomName;
                li.onclick = function() {
                    selectRoom(roomName);
                };
                recentRoomList.appendChild(li);
            });

            highlightRoom(currentRoom);
        }

        async function loadMe() {
            const res = await fetch("/api/me");
            const data = await res.json();

            if (!data.ok) {
                window.location.href = "/login";
                return;
            }

            currentUsername = data.username;
            document.getElementById("usernameText").innerText = currentUsername;
            document.getElementById("myAvatar").innerText = getInitial(currentUsername);
        }

        async function logout() {
            await fetch("/api/logout", { method: "POST" });
            window.location.href = "/login";
        }

        function joinRoom() {
            const roomInput = document.getElementById("room");
            currentRoom = roomInput.value.trim();

            if (!currentUsername || !currentRoom) {
                alert("请先登录并输入房间名");
                return;
            }

            document.getElementById("messages").innerHTML = "";
            document.getElementById("userList").innerHTML = "";
            document.getElementById("onlineCount").innerText = "当前 0 人";

            socket.emit("join", {
                room: currentRoom
            });

            hasJoined = true;
            addRecentRoom(currentRoom);
            highlightRoom(currentRoom);
            updateStatus();
        }

        function selectRoom(roomName) {
            document.getElementById("room").value = roomName;
            joinRoom();
        }

        socket.on("history", function(messages) {
            const messagesList = document.getElementById("messages");
            messagesList.innerHTML = "";

            messages.forEach(function(message) {
                appendMessage(message, false);
            });
        });

        socket.on("message", function(message) {
            appendMessage(message, true);
        });

        socket.on("user_list", function(users) {
            renderUserList(users);
        });

        socket.on("error_message", function(msg) {
            alert(msg);
        });

        function sendMessage() {
            if (!hasJoined) {
                alert("请先进入房间");
                return;
            }

            const messageInput = document.getElementById("message");
            const msg = messageInput.value.trim();
            const aiEnabled = document.getElementById("aiToggle").checked;

            if (!msg) {
                return;
            }

            socket.emit("message", {
                room: currentRoom,
                msg: msg,
                ai_enabled: aiEnabled
            });

            messageInput.value = "";
        }

        document.getElementById("message").addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

function toggleTheme() {
    document.body.classList.add("theme-changing");

    document.body.classList.toggle("dark");

    const isDark = document.body.classList.contains("dark");
    localStorage.setItem(themeKey, isDark ? "dark" : "light");

    setTimeout(() => {
        document.body.classList.remove("theme-changing");
    }, 300);
}
        function loadTheme() {
            const theme = localStorage.getItem(themeKey);
            if (theme === "dark") {
                document.body.classList.add("dark");
            }
        }

        async function initPage() {
            loadTheme();
            await loadMe();
            renderRecentRooms();
            updateStatus();
        }

        initPage();
    </script>
</body>
